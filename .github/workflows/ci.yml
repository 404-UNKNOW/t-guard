name: T-Guard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.65.0
          # 如果项目没有配置文件，可以指定跳过
          args: --timeout=5m

      - name: Run Tests with Race Detector
        # 使用 sqlite 编译需要 CGO
        env:
          CGO_ENABLED: 1
        run: |
          # 安装 sqlite 开发库以支持 CGO 编译 (Ubuntu 环境)
          sudo apt-get update && sudo apt-get install -y libsqlite3-dev
          go test -v -race -coverprofile=coverage.txt ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          fail_ci_if_error: false
