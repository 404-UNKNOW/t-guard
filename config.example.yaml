# T-Guard 配置文件

# 数据存储目录
data_dir: "./data"

# 监听地址
listen: "8080"

# 默认项目 ID
project: "default-project"

# 鉴权令牌 (客户端请求时需携带 X-TGuard-Auth: your-secret-token)
auth_key: "your-secret-token"

# 上游服务配置
upstreams:
  openai: "https://api.openai.com"
  anthropic: "https://api.anthropic.com"

# 动态路由规则
rules:
  - id: "claude-rule"
    priority: 200
    match:
      model: "claude-*"
    action:
      target: "anthropic"
  - id: "default-rule"
    priority: 100
    action:
      target: "openai"

# 计费预算配置
budget:
  - project: "default-project"
    hard_limit: 1000000  # 1000 美分 (10 USD)
    soft_limit: 0.8      # 80% 触发预警
